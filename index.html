<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MD3 Tonal Palette Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="header-icon" aria-hidden="true">
        <!-- palette icon -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3a9 9 0 0 0 0 18c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
        </svg>
      </div>
      <div>
        <p class="eyebrow">Material Design 3</p>
        <h1>Tonal Palette Generator</h1>
      </div>
    </div>
  </header>

  <main>
    <div class="left-col">
    <section class="card input-panel">
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="rgb" role="tab" aria-selected="true">RGB</button>
        <button class="tab" data-tab="hsv" role="tab" aria-selected="false">HSV</button>
        <button class="tab" data-tab="hsl" role="tab" aria-selected="false">HSL</button>
        <button class="tab" data-tab="hct" role="tab" aria-selected="false">HCT</button>
      </div>

      <div class="tab-content" id="tab-rgb" role="tabpanel">
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">R</span>
            <output class="hslider-value" id="rgb-r-val">103</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="rgb-r-track"></div>
            <input type="range" class="hslider" id="rgb-r" min="0" max="255" step="1" value="103">
          </div>
        </div>
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">G</span>
            <output class="hslider-value" id="rgb-g-val">80</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="rgb-g-track"></div>
            <input type="range" class="hslider" id="rgb-g" min="0" max="255" step="1" value="80">
          </div>
        </div>
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">B</span>
            <output class="hslider-value" id="rgb-b-val">164</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="rgb-b-track"></div>
            <input type="range" class="hslider" id="rgb-b" min="0" max="255" step="1" value="164">
          </div>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-hsv" role="tabpanel">
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">H</span>
            <output class="hslider-value" id="hsv-h-val">265°</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="hsv-h-track"></div>
            <input type="range" class="hslider" id="hsv-h" min="0" max="360" step="0.5" value="265">
          </div>
        </div>
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">S</span>
            <output class="hslider-value" id="hsv-s-val">50%</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="hsv-s-track"></div>
            <input type="range" class="hslider" id="hsv-s" min="0" max="100" step="1" value="50">
          </div>
        </div>
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">V</span>
            <output class="hslider-value" id="hsv-v-val">65%</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="hsv-v-track"></div>
            <input type="range" class="hslider" id="hsv-v" min="0" max="100" step="1" value="65">
          </div>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-hsl" role="tabpanel">
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">H</span>
            <output class="hslider-value" id="hsl-h-val">265°</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="hsl-h-track"></div>
            <input type="range" class="hslider" id="hsl-h" min="0" max="360" step="0.5" value="265">
          </div>
        </div>
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">S</span>
            <output class="hslider-value" id="hsl-s-val">50%</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="hsl-s-track"></div>
            <input type="range" class="hslider" id="hsl-s" min="0" max="100" step="1" value="50">
          </div>
        </div>
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">L</span>
            <output class="hslider-value" id="hsl-l-val">65%</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="hsl-l-track"></div>
            <input type="range" class="hslider" id="hsl-l" min="0" max="100" step="1" value="65">
          </div>
        </div>
      </div>

      <div class="tab-content hidden" id="tab-hct" role="tabpanel">
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">Hue</span>
            <output class="hslider-value" id="hue-value">265°</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="hue-track"></div>
            <input type="range" class="hslider" id="hue-slider" min="0" max="360" step="0.5" value="265">
          </div>
        </div>
        <div class="hslider-group">
          <div class="hslider-meta">
            <span class="hslider-label">Chroma</span>
            <output class="hslider-value" id="chroma-value">48</output>
          </div>
          <div class="hslider-wrap">
            <div class="hslider-track" id="chroma-track"></div>
            <input type="range" class="hslider" id="chroma-slider" min="0" max="120" step="0.5" value="48">
          </div>
        </div>
      </div>

      <div class="hex-row">
        <span class="hex-label">Hex</span>
        <input type="text" id="hex-input" value="#6750A4" maxlength="7" spellcheck="false" placeholder="#RRGGBB" aria-label="Hex color value">
      </div>

    </section>

    <section class="export-section">
      <span class="export-label">Export palette as</span>
      <div class="export-buttons">
        <button class="export-btn" id="copy-css">
          <!-- code icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M9.4 16.6 4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0 4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/>
          </svg>
          Copy CSS Variables
        </button>
        <button class="export-btn secondary" id="copy-json">
          <!-- data object icon -->
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
            <path d="M5 3H3v4H1V3C1 1.9 1.9 1 3 1h2v2zM3 17H1v4c0 1.1.9 2 2 2h2v-2H3v-4zm18 4h-2v2h2c1.1 0 2-.9 2-2v-4h-2v4zm0-18h-2V1h2c1.1 0 2 .9 2 2v4h-2V3zM11 7H7v10h4c2.2 0 4-1.8 4-4V11c0-2.2-1.8-4-4-4zm2 6c0 1.1-.9 2-2 2H9V9h2c1.1 0 2 .9 2 2v2z"/>
          </svg>
          Copy JSON
        </button>
      </div>
    </section>
  </div>

  <section class="palette-section">
    <div class="palette-header">
      <span class="palette-title">Tonal Palette</span>
      <span class="palette-tone-count">13 tones</span>
    </div>
    <div class="swatches" id="swatches" role="list" aria-label="Tonal palette"></div>
  </section>
</main>

  <div id="init-error" style="display:none;position:fixed;inset:0;background:#1c1b1f;z-index:999;align-items:center;justify-content:center;flex-direction:column;gap:16px;padding:24px;text-align:center;">
    <svg width="40" height="40" viewBox="0 0 24 24" fill="#f2b8b5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
    <p style="color:#f2b8b5;font-size:16px;font-weight:500;">ライブラリの読み込みに失敗しました</p>
    <p id="init-error-msg" style="color:#cac4d0;font-size:13px;font-family:monospace;max-width:480px;word-break:break-all;"></p>
    <p style="color:#cac4d0;font-size:13px;">ローカルサーバーで開くか、ブラウザのコンソールを確認してください。<br>例: <code style="background:#2b2930;padding:2px 8px;border-radius:4px;">npx serve .</code></p>
  </div>
  <script>
    window.addEventListener('unhandledrejection', function(e) {
      var overlay = document.getElementById('init-error');
      var msg = document.getElementById('init-error-msg');
      if (overlay) overlay.style.display = 'flex';
      if (msg) msg.textContent = String(e.reason);
    });
  </script>
  <script type="module" src="app.js"></script>
</body>
</html>
